name: CodeQL
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '31 3 * * 1'
permissions:
  actions: read
  contents: read
  security-events: write
jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/checkout@v5
        with:
          repository: wetuscorp/wtsissdk-android
          ref: codex/experiences-v2-0.5
          path: native-android
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.44.6', cache: true }
      - uses: github/codeql-action/init@v4
        with: { languages: java-kotlin, build-mode: manual }
      - run: cd native-android && ./gradlew :sdk:publishToMavenLocal
      - run: cd example && flutter pub get && flutter build apk --debug
      - uses: github/codeql-action/analyze@v4
  ios:
    runs-on: macos-15
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v5
        with: { path: wts_sdk }
      - uses: actions/checkout@v5
        with:
          repository: wetuscorp/wtsissdk-swift
          ref: codex/experiences-v2-0.5
          path: native-swift
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.44.6', cache: true }
      - uses: github/codeql-action/init@v4
        with: { languages: swift, build-mode: manual }
      - name: Prepare Flutter SwiftPM integration
        run: cd wts_sdk/example && flutter config --enable-swift-package-manager && flutter pub get && flutter build ios --simulator --config-only
        env:
          WTS_SDK_SWIFT_PATH: "${{ github.workspace }}/native-swift"
          WTS_SDK_SWIFT_POD_PATH: "${{ github.workspace }}/native-swift"
      - name: Build Swift sources under CodeQL tracing
        run: |
          xcodebuild \
            -workspace wts_sdk/example/ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath /tmp/wts-flutter-codeql \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS=arm64 \
            build
        env:
          WTS_SDK_SWIFT_PATH: "${{ github.workspace }}/native-swift"
          WTS_SDK_SWIFT_POD_PATH: "${{ github.workspace }}/native-swift"
      - uses: github/codeql-action/analyze@v4
