name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  dart:
    strategy:
      fail-fast: false
      matrix:
        flutter: ['3.35.7', '3.41.9', '3.44.6']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "${{ matrix.flutter }}", cache: true }
      - run: chmod +x scripts/verify-contracts.sh && scripts/verify-contracts.sh
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed lib test pigeons
      - run: flutter analyze
      - run: flutter test
      - run: dart run pigeon --input pigeons/messages.dart
      - run: git diff --exit-code
      - run: dart pub publish --dry-run
  android-example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/checkout@v5
        with:
          repository: wetuscorp/wtsissdk-android
          path: native-android
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.44.6', cache: true }
      - run: cd native-android && ./gradlew :sdk:publishToMavenLocal
      - run: cd example && flutter pub get && flutter build apk --debug
  ios-example:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/checkout@v5
        with:
          repository: wetuscorp/wtsissdk-swift
          path: native-swift
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.44.6', cache: true }
      - run: cd example && flutter pub get && flutter build ios --simulator
        env:
          WTS_SDK_SWIFT_PATH: ${{ github.workspace }}/native-swift
