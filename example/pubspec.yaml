name: wts_sdk_example
description: Runnable wts.is Flutter SDK integration example.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  wts_sdk:
    path: ..

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  # The runnable iOS example exercises the CocoaPods compatibility path.
  # The plugin's SwiftPM package is validated independently in CI.
  config:
    enable-swift-package-manager: false
